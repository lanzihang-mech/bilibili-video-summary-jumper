<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #5e6a75;
      --line: #d7dde3;
      --paper: #f7f8fa;
      --panel: #ffffff;
      --accent: #0a7cff;
      --accent-ink: #ffffff;
      --mark: #f0b429;
      --good: #147d64;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.55;
    }
    a { color: inherit; }
    .shell { max-width: 1180px; margin: 0 auto; padding: 28px 22px 44px; }
    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: start;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.1;
      letter-spacing: 0;
    }
    .meta { color: var(--muted); display: flex; flex-wrap: wrap; gap: 8px 14px; font-size: 14px; }
    .source {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 8px;
      background: var(--accent);
      color: var(--accent-ink);
      text-decoration: none;
      font-weight: 700;
      white-space: nowrap;
    }
    main { display: grid; grid-template-columns: 300px minmax(0, 1fr); gap: 22px; margin-top: 24px; }
    aside { position: sticky; top: 18px; align-self: start; }
    section { margin-bottom: 24px; }
    h2 { margin: 0 0 12px; font-size: 18px; letter-spacing: 0; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .toc { display: grid; gap: 8px; }
    .toc a {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 6px;
      text-decoration: none;
      background: #f3f6f8;
      color: var(--ink);
      font-size: 14px;
    }
    .toc span:last-child { color: var(--muted); white-space: nowrap; }
    .overview { display: grid; gap: 10px; margin: 0; padding-left: 18px; }
    .points { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .point {
      border-left: 4px solid var(--mark);
      background: var(--panel);
      border-radius: 8px;
      padding: 12px 14px;
      min-height: 88px;
    }
    .timeline { display: grid; gap: 12px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
    }
    .time {
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      color: var(--good);
      white-space: nowrap;
    }
    .card p { margin: 0; }
    .jump {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border-radius: 8px;
      background: #e8f2ff;
      color: #075bbb;
      text-decoration: none;
      font-weight: 800;
      white-space: nowrap;
    }
    .citation {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      font: 13px/1.5 ui-monospace, SFMono-Regular, Consolas, monospace;
      color: var(--ink);
      background: #fbfcfd;
    }
    @media (max-width: 860px) {
      header, main { grid-template-columns: 1fr; }
      aside { position: static; }
      .points { grid-template-columns: 1fr; }
      .card { grid-template-columns: 1fr; }
      .source, .jump { width: fit-content; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>{{TITLE}}</h1>
        <div class="meta">
          <span>来源：Bilibili</span>
          <span>字幕片段：{{CUE_COUNT}}</span>
          <span>总时长：{{DURATION}}</span>
          <span>生成时间：{{GENERATED_AT}}</span>
        </div>
      </div>
      <a class="source" href="{{SOURCE_URL}}" target="_blank" rel="noopener">打开原视频</a>
    </header>
    <main>
      <aside>
        <section class="panel">
          <h2>章节导航</h2>
          <nav class="toc">{{CHAPTER_NAV}}</nav>
        </section>
      </aside>
      <div>
        <section class="panel">
          <h2>总览</h2>
          <ol class="overview">{{OVERVIEW}}</ol>
        </section>
        <section>
          <h2>关键观点</h2>
          <div class="points">{{KEY_POINTS}}</div>
        </section>
        <section>
          <h2>时间线证据</h2>
          <div class="timeline">{{TIMELINE}}</div>
        </section>
        <section class="panel">
          <h2>可复制引用</h2>
          <textarea class="citation" readonly>{{CITATION}}</textarea>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
